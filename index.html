<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Daily Notes</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 50px;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #hasil {
            margin-top: 20px;
            text-align: left;
        }

        .catatan {
            background: #e8f5e9;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📒 My Daily Notes</h2>

    <textarea id="note" placeholder="Tulis catatan harian Anda..."></textarea>
    <br>
    <button onclick="simpanCatatan()">Simpan Catatan</button>

    <div id="hasil"></div>
</div>

<script>
    function simpanCatatan() {
        let catatan = document.getElementById("note").value;

        if (catatan === "") {
            alert("Silakan isi catatan terlebih dahulu!");
            return;
        }

        let hasil = document.getElementById("hasil");

        hasil.innerHTML += `
            <div class="catatan">
                <strong>${new Date().toLocaleDateString()}</strong><br>
                ${catatan}
            </div>
        `;

        document.getElementById("note").value = "";
    }
</script>

</body>
</html>
